---
---
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }}</title>
  <link
    rel="preload"
    href="/assets/fonts/PPNeueMontreal-Book.woff2"
    as="font"
    type="font/woff2"
    crossorigin
  />
  <link rel="stylesheet" href="/assets/flashcards/bundle.css" />
  <style>
    @font-face {
      font-family: "PPNeueMontreal-Book";
      src:
        url(/assets/fonts/PPNeueMontreal-Book.woff2) format("woff2"),
        url(/assets/fonts/PPNeueMontreal-Book.woff) format("woff");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    html, body { margin: 0; }
    body {
      background:
        repeating-linear-gradient(
          90deg,
          transparent 0,
          transparent 23px,
          rgba(0, 0, 0, 0.022) 23px,
          rgba(0, 0, 0, 0.022) 24px
        ),
        #fdfdfd;
      font-family: "PPNeueMontreal-Book", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color: #0d0d0f;
      min-height: 100vh;
    }
    .top-home {
      font-family: inherit;
      position: absolute;
      top: 5px;
      left: 20px;
      text-decoration: none;
      font-size: 2vh;
      color: #0d0d0f;
      padding: 5px 10px;
      z-index: 100;
      user-select: none;
      -webkit-user-select: none;
    }
    .top-home:hover { color: #00f; text-decoration: underline; }
    @media (max-width: 720px) {
      .top-home { font-size: 12px; padding: 4px 8px; }
    }
  </style>
</head>
<body>
  <a href="/" class="top-home">Home</a>
  {{ content }}
  <div id="flashcards-root"></div>
  <script type="module" src="/assets/flashcards/bundle.js"></script>
</body>
</html>
