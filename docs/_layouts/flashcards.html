<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }}</title>
  <link
    rel="preload"
    href="/assets/fonts/PPNeueMontreal-Book.woff2"
    as="font"
    type="font/woff2"
    crossorigin
  />
  <link rel="stylesheet" href="/assets/flashcards/bundle.css" />
  <style>
    @font-face {
      font-family: "PPNeueMontreal-Book";
      src:
        url(/assets/fonts/PPNeueMontreal-Book.woff2) format("woff2"),
        url(/assets/fonts/PPNeueMontreal-Book.woff) format("woff");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    html, body { margin: 0; }
    body {
      background: #fdfdfd;
      font-family: "PPNeueMontreal-Book", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color: #0d0d0f;
      min-height: 100vh;
    }
  </style>
</head>
<body>
  {{ content }}
  <div id="flashcards-root"></div>
  <script type="module" src="/assets/flashcards/bundle.js"></script>
</body>
</html>
